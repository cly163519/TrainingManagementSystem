spring.application.name=tms-backend
spring.datasource.url=jdbc:mysql://localhost:3306/tms?useUnicode=true&characterEncoding=utf-8&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

logging.level.com.laura.tmsbackend.mapper=debug
logging.level.web=DEBUG

logging.level.com.laura.tmsbackend=debug

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB